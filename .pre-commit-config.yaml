# Run locally with: uv run pre-commit install  (then hooks run on git commit)
# Or check everything: uv run pre-commit run --all-files
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files

  - repo: local
    hooks:
      # mypy runs via uv so it sees the project's own dependencies.
      - id: mypy
        name: mypy
        entry: uv run mypy .
        language: system
        pass_filenames: false
        types: [python]
