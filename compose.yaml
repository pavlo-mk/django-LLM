services:
  db:
    image: postgres:16
    container_name: djllm-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-djllm}
      POSTGRES_USER: ${POSTGRES_USER:-djllm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-djllm}
    ports:
      # host 5433 -> container 5432, to avoid clashing with a local Postgres
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-djllm}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-docker-dev-insecure-secret}
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,app"
      # Talk to the db service over the compose network (internal port 5432).
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-djllm}
      POSTGRES_USER: ${POSTGRES_USER:-djllm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-djllm}
      # Reach Ollama running natively on the host.
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request,sys;
          sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz/').status==200 else 1)
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

volumes:
  pgdata:
