services:
  db:
    image: postgres:16
    container_name: djllm-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-djllm}
      POSTGRES_USER: ${POSTGRES_USER:-djllm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-djllm}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-djllm}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
